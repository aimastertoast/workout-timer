    const TRANSLATIONS = {

      'en-US': {

        subtitle: 'iOS & Android HIIT Companion',

        exportRoutines: 'Export Backup',
        importRoutines: 'Import Backup',
        totalTime: 'Estimated Total Time',
        totalExercises: 'Total Exercises',
        addExercise: 'Add Exercise',
        noExercises: 'Click "Add Exercise" to start',
        workTimeLabel: 'Work Time',
        restTimeLabel: 'Rest Time',
        noRestLabel: 'Last Exercise (No Rest)',
        totalSets: 'Total Sets',
        appLanguage: 'Language & Voice',
        voiceGender: 'Voice Gender',
        female: 'Female',
        male: 'Male',
        startWorkout: 'Start Workout',
        currentProgress: 'Progress',
        currentSet: 'Round',
        prepTitle: 'Get Ready',
        workTitle: 'Work Time',
        restTitle: 'Rest Time',
        pausedTitle: 'Paused',
        finishedTitle: 'Workout Complete!',
        nextRest: 'Next: Rest',
        nextEx: 'Next: ',
        nextSet: 'Next Round: ',
        reset: 'Reset',
        resume: 'Resume',
        pause: 'Pause',
        skip: 'Skip',
        actionNamePlaceholder: 'Exercise Name',
        seconds: 's',
        min: 'm',
        sec: 's',
        speakPrepStart: 'Get ready',
        speakPrepNext: 'Ready',
        speakStart: 'Go',
        speakRest: 'Rest',
        speakFinish: 'Workout complete!',
        speakSetPrep: 'Round {set}, Ready',
        exercise: 'Exercise',
        minOneRoutine: 'At least one routine must be kept!',

        importNotice: 'Paste backup JSON data below:',
        importSuccess: 'Routines imported successfully!',
        importError: 'Invalid data format. Please check again.'

    };

    const WORK_OPTIONS = [5, 10, 15, 20, 25, 30, 35, 40, 45, 50, 55, 60, 75, 90, 105, 120, 150, 180, 210, 240, 270, 300, 360, 420, 480, 540, 600];
    const REST_OPTIONS = [0, 5, 10, 15, 20, 25, 30, 35, 40, 45, 50, 55, 60, 75, 90, 105, 120, 150, 180, 210, 240, 270, 300];

    const INITIAL_ROUTINES = [
      {
        id: 'routine-1',
        name: 'TABATA 高強度訓練',
        sets: 8,
        exercises: [
          { id: '1', name: '開合跳 (Jumping Jacks)', workTime: 20, restTime: 10 },
          { id: '2', name: '深蹲 (Squats)', workTime: 20, restTime: 10 },
          { id: '3', name: '波比跳 (Burpees)', workTime: 20, restTime: 10 },
          { id: '4', name: '高抬腿 (High Knees)', workTime: 20, restTime: 10 },
        ]
      }
    ];

    function App() {
      const [lang, setLang] = useState(() => localStorage.getItem('workout_lang') || 'zh-HK');
      const [gender, setGender] = useState(() => localStorage.getItem('workout_gender') || 'female');
      const t = TRANSLATIONS[lang] || TRANSLATIONS['zh-HK'];

      // Persistent Storage for Routines
      const [routines, setRoutines] = useState(() => {
        const saved = localStorage.getItem('workout_routines_v8') || localStorage.getItem('workout_routines_v7') || localStorage.getItem('workout_routines_v6');
        return saved ? JSON.parse(saved) : INITIAL_ROUTINES;
      });

      const [activeRoutineId, setActiveRoutineId] = useState(() => {
        return localStorage.getItem('workout_active_id_v8') || (routines[0] ? routines[0].id : '');
      });

      const currentRoutine = routines.find(r => r.id === activeRoutineId) || routines[0] || {
        id: 'temp', name: '自訂運動', sets: 2, exercises: []
      };

      const [soundEnabled, setSoundEnabled] = useState(true);
      const [view, setView] = useState('config');
      const [status, setStatus] = useState('idle');
      const [currentIndex, setCurrentIndex] = useState(0);
      const [currentSet, setCurrentSet] = useState(1);
      const [timeLeft, setTimeLeft] = useState(0);
      const [phaseDuration, setPhaseDuration] = useState(1);
      
      // Modals for Export/Import
      const [showExportModal, setShowExportModal] = useState(false);
      const [showImportModal, setShowImportModal] = useState(false);
      const [importText, setImportText] = useState('');

      const timerRef = useRef(null);
      const audioCtxRef = useRef(null);
      const wakeLockRef = useRef(null);

      useEffect(() => { localStorage.setItem('workout_lang', lang); }, [lang]);
      useEffect(() => { localStorage.setItem('workout_gender', gender); }, [gender]);
      useEffect(() => { 
        localStorage.setItem('workout_routines_v8', JSON.stringify(routines)); 
      }, [routines]);
      useEffect(() => { localStorage.setItem('workout_active_id_v8', activeRoutineId); }, [activeRoutineId]);

      // Pre-fetch browser TTS voices
      const [systemVoices, setSystemVoices] = useState([]);
      useEffect(() => {
        const updateVoices = () => {
          if ('speechSynthesis' in window) {
            setSystemVoices(window.speechSynthesis.getVoices() || []);
          }
        };
        updateVoices();
        if ('speechSynthesis' in window) {
          window.speechSynthesis.onvoiceschanged = updateVoices;
        }
      }, []);

      const initAudio = () => {
        if (!audioCtxRef.current) {
          const AudioCtx = window.AudioContext || window.webkitAudioContext;
          if (AudioCtx) audioCtxRef.current = new AudioCtx();
        }
        if (audioCtxRef.current && audioCtxRef.current.state === 'suspended') {
          audioCtxRef.current.resume();
        }
      };

      const playBeep = (freq = 800, duration = 0.15) => {
        if (!soundEnabled) return;
        try {
          initAudio();
          if (!audioCtxRef.current) return;
          const ctx = audioCtxRef.current;
          const osc = ctx.createOscillator();
          const gain = ctx.createGain();
          osc.frequency.setValueAtTime(freq, ctx.currentTime);
          gain.gain.setValueAtTime(0.3, ctx.currentTime);
          gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + duration);
          osc.connect(gain);
          gain.connect(ctx.destination);
          osc.start();
          osc.stop(ctx.currentTime + duration);
        } catch (e) {}
      };

      // Strict Voice Engine Matcher for Male/Female & Mandarin/Cantonese
      const speak = (text) => {
        if (!('speechSynthesis' in window)) return;
        try {
          window.speechSynthesis.cancel();
          const utterance = new SpeechSynthesisUtterance(text);
          
          // Explicit Language Code
          utterance.lang = lang;

          const voices = systemVoices.length > 0 ? systemVoices : (window.speechSynthesis.getVoices() || []);
          
          if (voices.length > 0) {
            let filteredVoices = [];

            // Strict Filter: Never let zh-CN use zh-HK voice!
            if (lang === 'zh-CN') {
              filteredVoices = voices.filter(v => {
                const vLang = (v.lang || '').toLowerCase().replace('_', '-');
                return (vLang.includes('zh-cn') || vLang.includes('zh-hans') || v.name.includes('Mandarin') || v.name.includes('Putonghua') || v.name.includes('Ting-Ting') || v.name.includes('Lili')) && !vLang.includes('hk') && !vLang.includes('tw');
              });
            } else if (lang === 'zh-HK') {
              filteredVoices = voices.filter(v => {
                const vLang = (v.lang || '').toLowerCase().replace('_', '-');
                return vLang.includes('zh-hk') || vLang.includes('zh-hant-hk') || v.name.includes('Sin-Ji') || v.name.includes('Cantonese');
              });
            } else {
              filteredVoices = voices.filter(v => v.lang.startsWith('en'));
            }

            // Assign matching voice ONLY if found for exact language
            if (filteredVoices.length > 0) {
              let genderVoice = null;
              if (gender === 'male') {
                genderVoice = filteredVoices.find(v => {
                  const name = v.name.toLowerCase();
                  return name.includes('male') || name.includes('kangkang') || name.includes('danny') || name.includes('alex') || name.includes('george') || name.includes('fred') || name.includes('li-mu');
                });
              } else {
                genderVoice = filteredVoices.find(v => {
                  const name = v.name.toLowerCase();
                  return name.includes('female') || name.includes('ting-ting') || name.includes('sin-ji') || name.includes('lili') || name.includes('samantha') || name.includes('victoria') || name.includes('kyoko');
                });
              }
              utterance.voice = genderVoice || filteredVoices[0];
            } else {
              // If no specific voice object for this language exists in array, leave utterance.voice NULL 
              // so iOS native fallback engine speaks utterance.lang in native Mandarin/Cantonese instead of wrong voice!
              utterance.voice = null;
            }
          }

          // Pitch Modulation Guarantee: Male = 0.65 (Deep Pitch), Female = 1.20 (High Pitch)
          if (gender === 'male') {
            utterance.pitch = 0.65;
            utterance.rate = 1.0;
          } else {
            utterance.pitch = 1.20;
            utterance.rate = 1.05;
          }

          window.speechSynthesis.speak(utterance);
        } catch (e) {}
      };

      const requestWakeLock = async () => {
        try {
          if ('wakeLock' in navigator) {
            wakeLockRef.current = await navigator.wakeLock.request('screen');
          }
        } catch (err) {}
      };

      const releaseWakeLock = () => {
        if (wakeLockRef.current) {
          wakeLockRef.current.release();
          wakeLockRef.current = null;
        }
      };

      // Timer Engine with 3-2-1 Work & Prep Countdown
      useEffect(() => {
        if (status === 'paused' || status === 'idle' || status === 'finished') {
          if (timerRef.current) clearInterval(timerRef.current);
          return;
        }

        timerRef.current = setInterval(() => {
          setTimeLeft((prev) => {
            if (prev <= 1) {
              handlePhaseComplete();
              return 0;
            }
            const nextTime = prev - 1;

            // QA FEATURE: 3-2-1 Countdown voice & beep for BOTH 'prep' and 'work' phases!
            if ((status === 'prep' || status === 'work') && nextTime <= 3 && nextTime >= 1) {
              playBeep(nextTime === 1 ? 1000 : 800, 0.2);
              speak(`${nextTime}`);
            }

            return nextTime;
          });
        }, 1000);

        return () => { if (timerRef.current) clearInterval(timerRef.current); };
      }, [status, currentIndex, currentSet, currentRoutine, lang, gender]);

      // Smart Rest Deduction Logic
      const handlePhaseComplete = () => {
        const exercises = currentRoutine.exercises;
        const isLastExerciseInSet = (currentIndex === exercises.length - 1);
        const currentEx = exercises[currentIndex];

        if (status === 'prep') {
          setStatus('work');
          setTimeLeft(currentEx.workTime);
          setPhaseDuration(currentEx.workTime);
          playBeep(1200, 0.4);
          speak(t.speakStart);
        } else if (status === 'work') {
          if (isLastExerciseInSet) {
            moveToNextSetOrFinish();
          } else {
            const userRest = currentEx.restTime || 0;
            if (userRest > 3) {
              const actualRest = userRest - 3;
              setStatus('rest');
              setTimeLeft(actualRest);
              setPhaseDuration(actualRest);
              playBeep(600, 0.3);
              speak(t.speakRest);
            } else if (userRest > 0) {
              setStatus('prep');
              setTimeLeft(userRest);
              setPhaseDuration(userRest);
              speak(t.speakPrepNext);
            } else {
              const nextIdx = currentIndex + 1;
              setCurrentIndex(nextIdx);
              setStatus('work');
              const nextEx = exercises[nextIdx];
              setTimeLeft(nextEx.workTime);
              setPhaseDuration(nextEx.workTime);
              playBeep(1200, 0.4);
              speak(t.speakStart);
            }
          }
        } else if (status === 'rest') {
          const nextIdx = currentIndex + 1;
          setCurrentIndex(nextIdx);
          setStatus('prep');
          setTimeLeft(3);
          setPhaseDuration(3);
          speak(t.speakPrepNext);
        }
      };

      const moveToNextSetOrFinish = () => {
        if (currentSet < currentRoutine.sets) {
          setCurrentSet(prev => prev + 1);
          setCurrentIndex(0);
          setStatus('prep');
          setTimeLeft(5);
          setPhaseDuration(5);
          const msg = t.speakSetPrep.replace('{set}', (currentSet + 1).toString());
          speak(msg);
        } else {
          setStatus('finished');
          releaseWakeLock();
          playBeep(1500, 0.6);
          speak(t.speakFinish);
        }
      };

      const startWorkout = () => {
        if (!currentRoutine.exercises || currentRoutine.exercises.length === 0) return;
        initAudio();
        requestWakeLock();
        setView('timer');
        setCurrentIndex(0);
        setCurrentSet(1);
        setStatus('prep');
        setTimeLeft(3);
        setPhaseDuration(3);
        speak(t.speakPrepStart);
      };

      const updateCurrentRoutine = (updater) => {
        setRoutines(routines.map(r => r.id === currentRoutine.id ? updater(r) : r));
      };

      const createNewRoutine = () => {
        const newId = `routine-${Date.now()}`;
        const newR = {
          id: newId,
          name: `${t.routines} ${routines.length + 1}`,
          sets: 2,
          exercises: [{ id: '1', name: `${t.exercise} 1`, workTime: 30, restTime: 10 }]
        };
        setRoutines([...routines, newR]);
        setActiveRoutineId(newId);
      };

      const deleteRoutine = (routineIdToDelete) => {
        if (routines.length <= 1) {
          alert(t.minOneRoutine);
          return;
        }
        const updated = routines.filter(r => r.id !== routineIdToDelete);
        setRoutines(updated);
        if (activeRoutineId === routineIdToDelete) {
          setActiveRoutineId(updated[0].id);
        }
      };

      // Import JSON Routine Backup
      const handleImportJSON = () => {
        try {
          const parsed = JSON.parse(importText);
          if (Array.isArray(parsed) && parsed.length > 0 && parsed[0].exercises) {
            setRoutines(parsed);
            setActiveRoutineId(parsed[0].id);
            setShowImportModal(false);
            setImportText('');
            alert(t.importSuccess);
          } else {
            alert(t.importError);
          }
        } catch (e) {
          alert(t.importError);
        }
      };

      const calculateTotalTime = () => {
        if (!currentRoutine.exercises || currentRoutine.exercises.length === 0) return `0${t.sec}`;
        const exercises = currentRoutine.exercises;
        
        let singleSetTime = 0;
        exercises.forEach((ex, idx) => {
          singleSetTime += ex.workTime;
          if (idx < exercises.length - 1) {
            singleSetTime += ex.restTime;
          }
        });

        const total = (singleSetTime * currentRoutine.sets) + 3;
        const mins = Math.floor(total / 60);
        const secs = total % 60;
        return `${mins}${t.min} ${secs}${t.sec}`;
      };

      const displayTimeLeft = status === 'rest' ? timeLeft + 3 : timeLeft;

      return (
        <div className="min-h-screen bg-slate-950 text-slate-100 flex flex-col font-sans select-none pb-10">
          {/* Top Bar */}
          <header className="sticky top-0 z-30 bg-slate-900/90 backdrop-blur border-b border-slate-800 px-4 py-3 flex items-center justify-between">
            <div className="flex items-center space-x-2">
              <div className="bg-emerald-500 p-2 rounded-xl text-slate-950 font-bold text-lg">🏋️</div>
              <div>
                <h1 className="font-extrabold text-base text-emerald-400">{t.title}</h1>
                <p className="text-[10px] text-slate-400">{t.subtitle}</p>
              </div>
            </div>
            <div className="flex items-center space-x-2">
              <button onClick={() => setShowExportModal(true)} title={t.exportRoutines} className="px-2 py-1 bg-slate-800 border border-slate-700 rounded-lg text-xs font-semibold text-slate-300">
                💾 備份
              </button>
              <button onClick={() => setSoundEnabled(!soundEnabled)} className="p-2 bg-slate-800 rounded-lg text-sm">
                {soundEnabled ? '🔊' : '🔇'}
              </button>
            </div>
          </header>

          <main className="flex-1 max-w-md w-full mx-auto px-4 pt-4 flex flex-col">
            {view === 'config' && (
              <div className="space-y-4">
                {/* Routines Carousel */}
                <section className="bg-slate-900 border border-slate-800 rounded-2xl p-3.5 space-y-2">
                  <div className="flex items-center justify-between">
                    <span className="text-xs font-semibold text-slate-400">{t.routines}</span>
                    <div className="flex space-x-1">
                      <button onClick={() => setShowImportModal(true)} className="px-2 py-1 bg-slate-800 text-slate-300 border border-slate-700 rounded-lg text-[11px] font-semibold">{t.importRoutines}</button>
                      <button onClick={createNewRoutine} className="px-2.5 py-1 bg-emerald-500/20 text-emerald-400 border border-emerald-500/30 rounded-lg text-xs font-semibold hover:bg-emerald-500/30 transition">+ {t.addRoutine}</button>
                    </div>
                  </div>
                  <div className="flex space-x-2 overflow-x-auto pb-1">
                    {routines.map(r => (
                      <div
                        key={r.id}
                        className={`px-3 py-1.5 rounded-xl text-xs shrink-0 font-semibold border flex items-center space-x-2 transition ${r.id === activeRoutineId ? 'bg-emerald-500/20 border-emerald-500 text-emerald-300' : 'bg-slate-800 border-slate-700 text-slate-400'}`}
                      >
                        <span onClick={() => setActiveRoutineId(r.id)} className="cursor-pointer">{r.name}</span>
                        {routines.length > 1 && (
                          <button
                            onClick={(e) => {
                              e.stopPropagation();
                              deleteRoutine(r.id);
                            }}
                            className="p-0.5 text-slate-500 hover:text-red-400 font-bold transition"
                          >
                            ✕
                          </button>
                        )}
                      </div>
                    ))}
                  </div>
                </section>

                <div className="bg-slate-900 border border-slate-800 rounded-2xl p-3.5 flex justify-between items-center">
                  <div>
                    <div className="text-[11px] text-slate-400">{t.totalTime}</div>
                    <div className="text-base font-extrabold text-emerald-300">{calculateTotalTime()}</div>
                  </div>
                  <div className="text-right">
                    <div className="text-[11px] text-slate-400">{t.totalExercises}</div>
                    <div className="text-base font-extrabold text-slate-200">{currentRoutine.exercises?.length || 0}</div>
                  </div>
                </div>

                {/* Exercises Editor */}
                <section className="bg-slate-900 border border-slate-800 rounded-2xl p-4 space-y-3">
                  <div className="flex justify-between items-center pb-2 border-b border-slate-800">
                    <input
                      type="text"
                      value={currentRoutine.name}
                      onChange={(e) => updateCurrentRoutine(r => ({ ...r, name: e.target.value }))}
                      className="bg-slate-800 border border-slate-700 rounded px-2 py-1 text-xs font-bold text-slate-100 focus:outline-none focus:border-emerald-500"
                    />
                    <button onClick={() => updateCurrentRoutine(r => ({
                      ...r,
                      exercises: [...r.exercises, { id: Date.now().toString(), name: `${t.exercise} ${r.exercises.length + 1}`, workTime: 30, restTime: 10 }]
                    }))} className="px-2.5 py-1 bg-emerald-500/20 text-emerald-400 border border-emerald-500/30 rounded text-xs font-semibold">+ {t.addExercise}</button>
                  </div>

                  <div className="space-y-2.5 max-h-[280px] overflow-y-auto pr-1">
                    {currentRoutine.exercises.map((ex, idx) => {
                      const isLast = (idx === currentRoutine.exercises.length - 1);
                      return (
                        <div key={ex.id} className="bg-slate-800/90 border border-slate-700/60 p-2.5 rounded-xl space-y-2 text-xs">
                          <div className="flex items-center space-x-2">
                            <span className="w-5 h-5 bg-slate-700 rounded-full flex items-center justify-center text-[10px] font-bold shrink-0">{idx + 1}</span>
                            <input
                              type="text"
                              value={ex.name}
                              onChange={(e) => updateCurrentRoutine(r => ({
                                ...r,
                                exercises: r.exercises.map(item => item.id === ex.id ? { ...item, name: e.target.value } : item)
                              }))}
                              className="bg-slate-900 border border-slate-700 rounded px-2 py-1 text-xs text-white flex-1 focus:outline-none focus:border-emerald-500"
                              placeholder={t.actionNamePlaceholder}
                            />
                            <button onClick={() => updateCurrentRoutine(r => ({
                              ...r, exercises: r.exercises.filter(item => item.id !== ex.id)
                            }))} className="text-red-400 p-1 hover:text-red-300">🗑️</button>
                          </div>

                          <div className="grid grid-cols-2 gap-2 text-[11px] pt-1 border-t border-slate-700/40">
                            {/* Work Time */}
                            <div className="flex justify-between items-center bg-slate-900/80 px-2 py-1.5 rounded border border-slate-700/50">
                              <span className="text-emerald-400 font-medium">{t.workTimeLabel}:</span>
                              <div className="flex items-center space-x-1">
                                <input
                                  type="number"
                                  min="1"
                                  value={ex.workTime}
                                  onChange={(e) => updateCurrentRoutine(r => ({
                                    ...r,
                                    exercises: r.exercises.map(item => item.id === ex.id ? { ...item, workTime: Math.max(1, parseInt(e.target.value) || 0) } : item)
                                  }))}
                                  className="w-10 bg-slate-800 text-right text-emerald-300 font-bold border border-slate-600 rounded px-1 py-0.5 text-xs focus:outline-none"
                                />
                                <select
                                  value=""
                                  onChange={(e) => {
                                    if (e.target.value) {
                                      const val = parseInt(e.target.value);
                                      updateCurrentRoutine(r => ({
                                        ...r,
                                        exercises: r.exercises.map(item => item.id === ex.id ? { ...item, workTime: val } : item)
                                      }));
                                    }
                                  }}
                                  className="bg-slate-800 text-emerald-300 border border-slate-600 rounded px-1 py-0.5 text-xs focus:outline-none"
                                >
                                  <option value="">▼</option>
                                  {WORK_OPTIONS.map(sec => (
                                    <option key={sec} value={sec}>{sec}s</option>
                                  ))}
                                </select>
                              </div>
                            </div>

                            {/* Rest Time */}
                            <div className="flex justify-between items-center bg-slate-900/80 px-2 py-1.5 rounded border border-slate-700/50">
                              <span className="text-amber-400 font-medium">{t.restTimeLabel}:</span>
                              {isLast ? (
                                <span className="text-slate-400 text-[10px] italic font-semibold">{t.noRestLabel}</span>
                              ) : (
                                <div className="flex items-center space-x-1">
                                  <input
                                    type="number"
                                    min="0"
                                    value={ex.restTime}
                                    onChange={(e) => updateCurrentRoutine(r => ({
                                      ...r,
                                      exercises: r.exercises.map(item => item.id === ex.id ? { ...item, restTime: Math.max(0, parseInt(e.target.value) || 0) } : item)
                                    }))}
                                    className="w-10 bg-slate-800 text-right text-amber-300 font-bold border border-slate-600 rounded px-1 py-0.5 text-xs focus:outline-none"
                                  />
                                  <select
                                    value=""
                                    onChange={(e) => {
                                      if (e.target.value !== "") {
                                        const val = parseInt(e.target.value);
                                        updateCurrentRoutine(r => ({
                                          ...r,
                                          exercises: r.exercises.map(item => item.id === ex.id ? { ...item, restTime: val } : item)
                                        }));
                                      }
                                    }}
                                    className="bg-slate-800 text-amber-300 border border-slate-600 rounded px-1 py-0.5 text-xs focus:outline-none"
                                  >
                                    <option value="">▼</option>
                                    {REST_OPTIONS.map(sec => (
                                      <option key={sec} value={sec}>{sec}s</option>
                                    ))}
                                  </select>
                                </div>
                              )}
                            </div>
                          </div>
                        </div>
                      );
                    })}
                  </div>
                </section>

                {/* Settings */}
                <section className="bg-slate-900 border border-slate-800 rounded-2xl p-3.5 space-y-3">
                  <div className="flex justify-between items-center text-xs">
                    <span className="font-semibold text-slate-300">{t.totalSets}</span>
                    <div className="flex items-center space-x-2">
                      <button onClick={() => updateCurrentRoutine(r => ({ ...r, sets: Math.max(1, r.sets - 1) }))} className="w-7 h-7 bg-slate-800 border border-slate-700 rounded font-bold text-sm">-</button>
                      <span className="text-emerald-400 font-bold text-sm w-4 text-center">{currentRoutine.sets}</span>
                      <button onClick={() => updateCurrentRoutine(r => ({ ...r, sets: r.sets + 1 }))} className="w-7 h-7 bg-slate-800 border border-slate-700 rounded font-bold text-sm">+</button>
                    </div>
                  </div>
                  
                  {/* Language Selector */}
                  <div className="flex justify-between items-center text-xs border-t border-slate-800 pt-2.5">
                    <span className="font-semibold text-slate-300">🌐 {t.appLanguage}</span>
                    <select value={lang} onChange={(e) => setLang(e.target.value)} className="bg-slate-800 border border-slate-700 text-slate-200 rounded px-2.5 py-1 text-xs focus:outline-none">
                      <option value="zh-HK">繁體中文 (廣東話)</option>
                      <option value="zh-CN">简体中文 (普通话)</option>
                      <option value="en-US">English</option>
                    </select>
                  </div>

                  {/* Gender Selector */}
                  <div className="flex justify-between items-center text-xs border-t border-slate-800 pt-2.5">
                    <span className="font-semibold text-slate-300">🗣️ {t.voiceGender}</span>
                    <select value={gender} onChange={(e) => setGender(e.target.value)} className="bg-slate-800 border border-slate-700 text-slate-200 rounded px-2.5 py-1 text-xs focus:outline-none">
                      <option value="female">👧 {t.female}</option>
                      <option value="male">👦 {t.male}</option>
                    </select>
                  </div>
                </section>

                <button onClick={startWorkout} className="w-full py-3.5 bg-gradient-to-r from-emerald-500 to-teal-400 text-slate-950 font-black text-base rounded-2xl shadow-lg active:scale-95 transition">
                  ▶ {t.startWorkout}
                </button>
              </div>
            )}

            {/* Timer Screen */}
            {view === 'timer' && (
              <div className="space-y-6 py-4 flex-1 flex flex-col justify-between">
                <div className="flex justify-between bg-slate-900 p-3 rounded-2xl text-xs border border-slate-800">
                  <div>{t.currentProgress}: <span className="text-emerald-400 font-bold">{currentIndex + 1}/{currentRoutine.exercises.length}</span></div>
                  <div>{t.currentSet}: <span className="text-emerald-400 font-bold">{currentSet}/{currentRoutine.sets}</span></div>
                </div>

                <div className="flex justify-center my-auto">
                  <div className={`relative w-72 h-72 rounded-full bg-slate-900 border-4 ${status === 'work' ? 'border-emerald-500' : status === 'rest' ? 'border-amber-500' : 'border-blue-500'} flex flex-col items-center justify-center p-4 shadow-2xl transition-all duration-300`}>
                    <div className="text-xs bg-slate-800 text-slate-200 px-3 py-1 rounded-full uppercase mb-2 font-bold border border-slate-700">
                      {status === 'prep' ? t.prepTitle : status === 'work' ? t.workTitle : status === 'rest' ? t.restTitle : status === 'paused' ? t.pausedTitle : t.finishedTitle}
                    </div>
                    <div className="text-7xl font-mono font-black tracking-tight">{displayTimeLeft}<span className="text-lg font-normal text-slate-400 ml-1">{t.seconds}</span></div>
                    <div className="text-base font-bold text-slate-100 mt-2 truncate max-w-[200px]">
                      {status === 'prep' ? t.prepTitle : currentRoutine.exercises[currentIndex]?.name}
                    </div>
                  </div>
                </div>

                <div className="grid grid-cols-3 gap-3">
                  <button onClick={() => { releaseWakeLock(); setView('config'); setStatus('idle'); }} className="py-3 bg-slate-800 border border-slate-700 rounded-xl text-xs font-bold active:scale-95 transition">
                    🔄 {t.reset}
                  </button>
                  <button onClick={() => setStatus(status === 'paused' ? 'work' : 'paused')} className="py-3 bg-emerald-500 text-slate-950 rounded-xl text-xs font-bold active:scale-95 transition">
                    {status === 'paused' ? '▶ ' + t.resume : '⏸ ' + t.pause}
                  </button>
                  <button onClick={handlePhaseComplete} className="py-3 bg-slate-800 border border-slate-700 rounded-xl text-xs font-bold active:scale-95 transition">
                    ⏭ {t.skip}
                  </button>
                </div>
              </div>
            )}
          </main>

          {/* Export Modal */}
          {showExportModal && (
            <div className="fixed inset-0 z-50 bg-slate-950/80 backdrop-blur-sm flex items-center justify-center p-4">
              <div className="bg-slate-900 border border-slate-800 rounded-3xl p-5 max-w-sm w-full space-y-3 shadow-2xl">
                <div className="flex items-center justify-between border-b border-slate-800 pb-2">
                  <h3 className="font-bold text-sm text-slate-100">{t.exportRoutines}</h3>
                  <button onClick={() => setShowExportModal(false)} className="text-slate-400 font-bold">✕</button>
                </div>
                <p className="text-xs text-slate-300">{t.backupNotice}</p>
                <textarea
                  readOnly
                  value={JSON.stringify(routines, null, 2)}
                  className="w-full h-40 bg-slate-950 border border-slate-800 rounded-xl p-2 text-[10px] font-mono text-emerald-400 focus:outline-none"
                />
                <button
                  onClick={() => {
                    navigator.clipboard.writeText(JSON.stringify(routines, null, 2));
                    alert('已複製到剪貼簿！');
                  }}
                  className="w-full py-2.5 bg-emerald-500 text-slate-950 font-bold text-xs rounded-xl"
                >
                  複製備份文字
                </button>
              </div>
            </div>
          )}

          {/* Import Modal */}
          {showImportModal && (
            <div className="fixed inset-0 z-50 bg-slate-950/80 backdrop-blur-sm flex items-center justify-center p-4">
              <div className="bg-slate-900 border border-slate-800 rounded-3xl p-5 max-w-sm w-full space-y-3 shadow-2xl">
                <div className="flex items-center justify-between border-b border-slate-800 pb-2">
                  <h3 className="font-bold text-sm text-slate-100">{t.importRoutines}</h3>
                  <button onClick={() => setShowImportModal(false)} className="text-slate-400 font-bold">✕</button>
                </div>
                <p className="text-xs text-slate-300">{t.importNotice}</p>
                <textarea
                  value={importText}
                  onChange={(e) => setImportText(e.target.value)}
                  placeholder='[{"id":"1", "name":"My Routine", ...}]'
                  className="w-full h-40 bg-slate-950 border border-slate-800 rounded-xl p-2 text-[10px] font-mono text-slate-200 focus:outline-none"
                />
                <button
                  onClick={handleImportJSON}
                  className="w-full py-2.5 bg-emerald-500 text-slate-950 font-bold text-xs rounded-xl"
                >
                  確認還原/匯入
                </button>
              </div>
            </div>
          )}

        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
